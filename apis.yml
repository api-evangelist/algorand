apis:
  - aid: algorand:algorand-algod-api
    name: Algorand Algod REST API
    tags:
      - Blockchain
      - Accounts
      - Assets
      - Transactions
      - Blocks
      - Smart Contracts
      - State Proofs
    humanURL: https://dev.algorand.co/reference/rest-api/algod/
    baseURL: https://mainnet-api.4160.nodely.dev
    properties:
      - url: https://dev.algorand.co/reference/rest-api/algod/
        type: Documentation
      - url: https://raw.githubusercontent.com/algorand/go-algorand/master/daemon/algod/api/algod.oas3.yml
        type: OpenAPI
    description: >-
      The Algod REST API is the primary interface for interacting with a live Algorand node. It exposes
      endpoints for querying account information, asset details, application (smart contract) state,
      pending and confirmed transactions, blocks, and state proofs. Developers can submit signed raw
      transactions, simulate transaction groups, compile and disassemble TEAL programs, manage catchpoint
      catchups, and inspect ledger supply. Authentication uses an X-Algo-API-Token header. Public archival
      nodes (e.g. mainnet-api.4160.nodely.dev) are freely accessible without a token on the free tier.
  - aid: algorand:algorand-indexer-api
    name: Algorand Indexer REST API
    tags:
      - Blockchain
      - Analytics
      - Accounts
      - Assets
      - Transactions
      - Blocks
      - Applications
    humanURL: https://dev.algorand.co/reference/rest-api/indexer/
    baseURL: https://mainnet-idx.4160.nodely.dev
    properties:
      - url: https://dev.algorand.co/reference/rest-api/indexer/
        type: Documentation
      - url: https://raw.githubusercontent.com/algorand/indexer/main/api/indexer.oas3.yml
        type: OpenAPI
    description: >-
      The Algorand Indexer 2.0 API is a ledger analytics REST API backed by a PostgreSQL database
      populated by the algorand-indexer daemon. It provides rich historical search across transactions,
      accounts, assets, applications, blocks, and block headers with flexible query parameters including
      address, asset ID, application ID, round ranges, note prefixes, and more. Responses include
      cursor-based pagination for traversing large result sets. Public archival indexer nodes are
      available at mainnet-idx.4160.nodely.dev (and legacy algonode.cloud endpoints) free of charge.
  - aid: algorand:algorand-kmd-api
    name: Algorand KMD REST API
    tags:
      - Key Management
      - Wallets
      - Signing
      - Security
    humanURL: https://dev.algorand.co/reference/rest-api/overview/
    baseURL: http://localhost:7833
    properties:
      - url: https://dev.algorand.co/reference/rest-api/overview/
        type: Documentation
    description: >-
      The Key Management Daemon (KMD) REST API provides local key storage and transaction signing for
      Algorand nodes. It exposes wallet management, key generation, and signing endpoints through a
      locally-running daemon. Authentication uses an X-KMD-API-Token header with a token stored in the
      node's data directory. KMD is intended for node operators and local development workflows; production
      applications typically use external signing solutions or the AlgoKit SDK utilities instead.
