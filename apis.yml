description: >-
  Algorand is a pure proof-of-stake blockchain platform designed for speed, security, and decentralization.
  It exposes REST APIs through two core daemons — Algod (the Algorand protocol daemon) for real-time node
  interaction including submitting transactions, querying account balances, retrieving blocks, and managing
  smart contracts; and the Indexer daemon for deep historical querying of accounts, assets, applications,
  transactions, and blocks from a PostgreSQL-backed store. A third daemon, KMD (Key Management Daemon),
  handles local key storage and signing. Public archival endpoints are freely available via third-party
  providers such as Nodely/AlgoNode, and the developer toolchain is anchored by AlgoKit with SDKs for
  Python, JavaScript, Go, and Java.
